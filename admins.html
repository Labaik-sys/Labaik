<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LABAIK | Admin Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050A09; color: #e0e0e0; font-family: 'Inter', sans-serif; padding: 20px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 24px; margin-bottom: 20px; }
        input, select, textarea { background: #0D1412; border: 1px solid #1A2622; color: white; padding: 12px; border-radius: 12px; width: 100%; margin: 8px 0; outline: none; font-size: 13px; }
        .btn-green { background: #1DB954; color: #050A09; font-weight: 800; padding: 12px; border-radius: 12px; width: 100%; cursor: pointer; transition: 0.3s; }
        .btn-green:hover { background: #1ed760; transform: scale(1.02); }
        .label-style { font-weight: bold; font-size: 10px; color: #1DB954; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Book Card Preview in Admin */
        .book-preview { background: linear-gradient(135deg, #e91e63, #2196f3); border-radius: 15px; padding: 15px; position: relative; overflow: hidden; width: 160px; height: 220px; }
        .book-preview img { position: absolute; bottom: -10px; right: -10px; width: 100px; transform: rotate(-15deg); border-radius: 8px; box-shadow: -5px 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="max-w-5xl mx-auto">

    <header class="mb-10 border-b border-white/5 pb-6 flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-black text-[#1DB954]">LABAIK STUDIO</h1>
            <p class="text-xs text-gray-500 uppercase tracking-widest">Live Content & Library Manager</p>
        </div>
    </header>

    <div class="grid md:grid-cols-3 gap-6">
        <!-- Category & Reciter -->
        <div class="space-y-6">
            <div class="card">
                <p class="label-style mb-4">1. Category</p>
                <div class="flex gap-2">
                    <input type="text" id="cat-name" placeholder="Name">
                    <button onclick="addCategory()" class="bg-white text-black px-4 rounded-xl font-bold">Add</button>
                </div>
                <div id="cat-display" class="mt-4 space-y-2 max-height-40 overflow-y-auto"></div>
            </div>
            <div class="card">
                <p class="label-style mb-4">2. Reciter</p>
                <input type="text" id="cre-name" placeholder="Name">
                <input type="text" id="cre-pic" placeholder="Image URL">
                <button onclick="addCreator()" class="btn-green mt-2">Register Reciter</button>
                <div id="cre-display" class="mt-4 space-y-2"></div>
            </div>
        </div>

        <!-- Publish Noha -->
        <div class="card">
            <p class="label-style mb-4">3. Publish Noha</p>
            <select id="n-cat"><option>Assign Category</option></select>
            <select id="n-cre"><option>Assign Reciter</option></select>
            <input type="text" id="n-name" placeholder="Noha Title">
            <input type="text" id="n-pic" placeholder="Cover URL">
            <input type="text" id="n-url" placeholder="Audio URL">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="n-nature" placeholder="Nature Mix">
                <input type="text" id="n-rain" placeholder="Rain Mix">
            </div>
            <button onclick="publishNoha()" class="btn-green mt-4 italic">PUBLISH NOHA</button>
        </div>

        <!-- NEW: Publish Book -->
        <div class="card border-l-4 border-pink-500">
            <p class="label-style mb-4 text-pink-500">4. Digital Library</p>
            <input type="text" id="b-title" placeholder="Book Title">
            <textarea id="b-desc" placeholder="Short Description..." rows="2"></textarea>
            <input type="text" id="b-pic" placeholder="Book Cover Image URL">
            <input type="text" id="b-pdf" placeholder="PDF URL (Drive/Dropbox)">
            <button onclick="publishBook()" class="w-full bg-gradient-to-r from-pink-500 to-blue-500 text-white font-black py-3 rounded-xl mt-4">PUBLISH BOOK</button>
            
            <div class="mt-6 border-t border-white/5 pt-4">
                <p class="text-[9px] uppercase opacity-40 mb-3 tracking-widest">Live Books</p>
                <div id="book-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- Live Media Status -->
    <div class="card mt-6">
        <p class="label-style mb-4 text-gray-500">Live Noha Records</p>
        <div id="noha-list" class="grid grid-cols-2 md:grid-cols-4 gap-4 text-xs font-bold"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA1tNtHLr5xiTFuU9qvEEc6IwmQFqWJLU4",
            authDomain: "zaigham-apps.firebaseapp.com",
            projectId: "zaigham-apps",
            appId: "1:640695849473:web:8720ecd76e0634661a2600"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Category Logic ---
        window.addCategory = async () => {
            const name = document.getElementById('cat-name').value;
            if(name) await addDoc(collection(db, "categories"), { name });
            document.getElementById('cat-name').value = '';
        };

        onSnapshot(collection(db, "categories"), (snap) => {
            const disp = document.getElementById('cat-display');
            const select = document.getElementById('n-cat');
            disp.innerHTML = ''; select.innerHTML = '<option>Assign Category</option>';
            snap.forEach(d => {
                disp.innerHTML += `<div class="flex justify-between bg-white/5 p-2 rounded-lg"><span>${d.data().name}</span><i class="fas fa-trash text-red-500 cursor-pointer" onclick="remove('categories','${d.id}')"></i></div>`;
                select.innerHTML += `<option value="${d.id}">${d.data().name}</option>`;
            });
        });

        // --- Creator Logic ---
        window.addCreator = async () => {
            const name = document.getElementById('cre-name').value;
            const pic = document.getElementById('cre-pic').value;
            if(name) await addDoc(collection(db, "creators"), { name, pic });
            document.getElementById('cre-name').value = '';
        };

        onSnapshot(collection(db, "creators"), (snap) => {
            const disp = document.getElementById('cre-display');
            const select = document.getElementById('n-cre');
            disp.innerHTML = ''; select.innerHTML = '<option>Assign Reciter</option>';
            snap.forEach(d => {
                disp.innerHTML += `<div class="flex justify-between bg-white/5 p-2 rounded-lg"><span>${d.data().name}</span><i class="fas fa-trash text-red-500 cursor-pointer" onclick="remove('creators','${d.id}')"></i></div>`;
                select.innerHTML += `<option value="${d.id}">${d.data().name}</option>`;
            });
        });

        // --- Noha Publishing ---
        window.publishNoha = async () => {
            const data = {
                name: document.getElementById('n-name').value,
                songPic: document.getElementById('n-pic').value,
                url: document.getElementById('n-url').value,
                catId: document.getElementById('n-cat').value,
                creId: document.getElementById('n-cre').value,
                natureUrl: document.getElementById('n-nature').value || "",
                rainUrl: document.getElementById('n-rain').value || "",
                timestamp: Date.now()
            };
            if(data.name && data.url) {
                await addDoc(collection(db, "labaik_songs"), data);
                alert("Noha Live!");
                document.querySelectorAll('.card input').forEach(i => i.value = '');
            }
        };

        onSnapshot(query(collection(db, "labaik_songs"), orderBy("timestamp", "desc")), (snap) => {
            const disp = document.getElementById('noha-list'); disp.innerHTML = '';
            snap.forEach(d => {
                disp.innerHTML += `<div class="flex items-center gap-2 bg-white/5 p-2 rounded-lg">
                    <img src="${d.data().songPic}" class="w-8 h-8 rounded object-cover">
                    <span class="truncate flex-1">${d.data().name}</span>
                    <i class="fas fa-trash text-red-800 cursor-pointer" onclick="remove('labaik_songs','${d.id}')"></i>
                </div>`;
            });
        });

        // --- NEW: Book Publishing ---
        window.publishBook = async () => {
            const data = {
                title: document.getElementById('b-title').value,
                desc: document.getElementById('b-desc').value,
                cover: document.getElementById('b-pic').value,
                pdfUrl: document.getElementById('b-pdf').value,
                timestamp: Date.now()
            };
            if(data.title && data.pdfUrl) {
                await addDoc(collection(db, "labaik_library"), data);
                alert("Book Added to Library!");
                document.getElementById('b-title').value = '';
                document.getElementById('b-desc').value = '';
                document.getElementById('b-pic').value = '';
                document.getElementById('b-pdf').value = '';
            }
        };

        onSnapshot(query(collection(db, "labaik_library"), orderBy("timestamp", "desc")), (snap) => {
            const disp = document.getElementById('book-list'); disp.innerHTML = '';
            snap.forEach(d => {
                disp.innerHTML += `<div class="flex items-center gap-3 bg-white/5 p-3 rounded-xl border border-white/5">
                    <div class="w-10 h-12 bg-gradient-to-br from-pink-500 to-blue-500 rounded flex items-center justify-center text-[10px] font-black">PDF</div>
                    <div class="flex-1">
                        <p class="text-xs font-bold">${d.data().title}</p>
                        <p class="text-[8px] opacity-30 uppercase tracking-tighter">Live in Library</p>
                    </div>
                    <i class="fas fa-trash-alt text-red-500 cursor-pointer text-xs" onclick="remove('labaik_library','${d.id}')"></i>
                </div>`;
            });
        });

        window.remove = async (coll, id) => { if(confirm("Permanently Delete?")) await deleteDoc(doc(db, coll, id)); };
    </script>
</body>
</html>
