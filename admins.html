<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LABAIK | Admin Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050A09; color: #e0e0e0; font-family: 'Inter', sans-serif; padding: 20px; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 24px; margin-bottom: 20px; }
        input, select, textarea { background: #0D1412; border: 1px solid #1A2622; color: white; padding: 12px; border-radius: 12px; width: 100%; margin: 8px 0; outline: none; font-size: 13px; }
        .btn-green { background: #1DB954; color: #050A09; font-weight: 800; padding: 12px; border-radius: 12px; width: 100%; cursor: pointer; transition: 0.3s; }
        .btn-green:hover { background: #1ed760; transform: scale(1.02); }
        .label-style { font-weight: bold; font-size: 10px; color: #1DB954; text-transform: uppercase; letter-spacing: 1px; }
        .book-label { color: #f472b6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .edit-active { border: 2px solid #1DB954 !important; }
    </style>
</head>
<body class="max-w-6xl mx-auto">

    <header class="mb-10 border-b border-white/5 pb-6 flex justify-between items-end">
        <div>
            <h1 class="text-3xl font-black text-[#1DB954]">LABAIK STUDIO</h1>
            <p class="text-xs text-gray-500 uppercase tracking-widest">Master Control Panel</p>
        </div>
    </header>

    <div class="grid md:grid-cols-3 gap-6">
        
        <!-- COLUMN 1: CATEGORIES & RECITERS -->
        <div class="space-y-6">
            <div class="card">
                <p class="label-style mb-4">1. Noha Categories</p>
                <div class="flex gap-2">
                    <input type="text" id="cat-name" placeholder="E.g. Matami">
                    <button onclick="addCategory('categories', 'cat-name')" class="bg-white text-black px-4 rounded-xl font-bold">Add</button>
                </div>
                <div id="cat-display" class="mt-4 space-y-2 max-h-40 overflow-y-auto no-scrollbar"></div>
            </div>

            <div class="card">
                <p class="label-style mb-4 book-label">2. Library Categories</p>
                <div class="flex gap-2">
                    <input type="text" id="lib-cat-name" placeholder="E.g. History">
                    <button onclick="addCategory('book_categories', 'lib-cat-name')" class="bg-pink-500 text-white px-4 rounded-xl font-bold">Add</button>
                </div>
                <div id="lib-cat-display" class="mt-4 space-y-2 max-h-40 overflow-y-auto no-scrollbar"></div>
            </div>

            <div class="card">
                <p class="label-style mb-4">3. Reciter / Creator</p>
                <input type="text" id="cre-name" placeholder="Name">
                <input type="text" id="cre-pic" placeholder="Image URL">
                <button onclick="addCreator()" class="btn-green mt-2">Register Reciter</button>
                <div id="cre-display" class="mt-4 space-y-2"></div>
            </div>
        </div>

        <!-- COLUMN 2: PUBLISH & EDIT NOHA -->
        <div class="card" id="noha-form-card">
            <p class="label-style mb-4" id="form-mode-title">4. Publish Noha</p>
            <input type="hidden" id="edit-id">
            <select id="n-cat"><option value="">Assign Noha Category</option></select>
            <select id="n-cre"><option value="">Assign Reciter</option></select>
            <input type="text" id="n-name" placeholder="Noha Title">
            <input type="text" id="n-pic" placeholder="Cover URL">
            <input type="text" id="n-url" placeholder="Audio URL">
            <div class="grid grid-cols-2 gap-2">
                <input type="text" id="n-nature" placeholder="Nature Mix URL">
                <input type="text" id="n-rain" placeholder="Rain Mix URL">
            </div>
            <button id="publish-btn" onclick="publishNoha()" class="btn-green mt-4 italic">PUBLISH RECORD</button>
            <button id="cancel-edit-btn" onclick="resetForm()" class="hidden w-full text-[10px] font-bold opacity-40 mt-3 uppercase">Cancel Edit</button>
            
            <!-- NEW SECTION: UNASSIGNED NOHAY -->
            <div class="mt-8 pt-4 border-t border-red-500/20">
                <p class="text-[9px] uppercase text-red-500 font-bold mb-3 tracking-widest">⚠️ Unassigned Records (Needs Fix)</p>
                <div id="unassigned-list" class="space-y-2"></div>
            </div>

            <div class="mt-8 pt-4 border-t border-white/5">
                <p class="text-[9px] uppercase opacity-40 mb-3 tracking-widest">Recent Nohas</p>
                <div id="noha-list" class="space-y-2 h-64 overflow-y-auto no-scrollbar"></div>
            </div>
        </div>

        <!-- COLUMN 3: PUBLISH BOOK -->
        <div class="card border-l-4 border-pink-500">
            <p class="label-style mb-4 book-label">5. Digital Library</p>
            <select id="b-cat"><option>Select Book Category</option></select>
            <input type="text" id="b-title" placeholder="Book Title">
            <input type="text" id="b-author" placeholder="Author Name">
            <textarea id="b-desc" placeholder="Brief Summary..." rows="2"></textarea>
            <input type="text" id="b-pic" placeholder="Cover Image URL">
            <input type="text" id="b-pdf" placeholder="PDF Direct URL">
            
            <button onclick="publishBook()" class="w-full bg-gradient-to-r from-pink-500 to-blue-500 text-white font-black py-3 rounded-xl mt-4 active:scale-95 transition">PUBLISH BOOK</button>
            
            <div class="mt-8 pt-4 border-t border-white/5">
                <p class="text-[9px] uppercase opacity-40 mb-3 tracking-widest text-pink-400">Library Archive</p>
                <div id="book-list" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA1tNtHLr5xiTFuU9qvEEc6IwmQFqWJLU4",
            authDomain: "zaigham-apps.firebaseapp.com",
            projectId: "zaigham-apps",
            appId: "1:640695849473:web:8720ecd76e0634661a2600"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.remove = async (coll, id) => { if(confirm("Confirm Delete?")) await deleteDoc(doc(db, coll, id)); };

        // --- Category Logic ---
        window.addCategory = async (collName, inputId) => {
            const val = document.getElementById(inputId).value;
            if(val) await addDoc(collection(db, collName), { name: val });
            document.getElementById(inputId).value = '';
        };

        onSnapshot(collection(db, "categories"), (snap) => {
            const disp = document.getElementById('cat-display');
            const select = document.getElementById('n-cat');
            disp.innerHTML = ''; select.innerHTML = '<option value="">Assign Noha Category</option>';
            snap.forEach(d => {
                disp.innerHTML += `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-xs"><span>${d.data().name}</span><i class="fas fa-times text-red-500 cursor-pointer" onclick="remove('categories','${d.id}')"></i></div>`;
                select.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`;
            });
        });

        onSnapshot(collection(db, "book_categories"), (snap) => {
            const disp = document.getElementById('lib-cat-display');
            const select = document.getElementById('b-cat');
            disp.innerHTML = ''; select.innerHTML = '<option>Select Book Category</option>';
            snap.forEach(d => {
                disp.innerHTML += `<div class="flex justify-between bg-pink-500/10 p-2 rounded-lg text-xs"><span>${d.data().name}</span><i class="fas fa-times text-red-400 cursor-pointer" onclick="remove('book_categories','${d.id}')"></i></div>`;
                select.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`;
            });
        });

        // --- Reciter Logic ---
        window.addCreator = async () => {
            const name = document.getElementById('cre-name').value;
            const pic = document.getElementById('cre-pic').value;
            if(name) await addDoc(collection(db, "creators"), { name, pic });
            document.getElementById('cre-name').value = ''; document.getElementById('cre-pic').value = '';
        };

        onSnapshot(collection(db, "creators"), (snap) => {
            const disp = document.getElementById('cre-display');
            const select = document.getElementById('n-cre');
            disp.innerHTML = ''; select.innerHTML = '<option value="">Assign Reciter</option>';
            snap.forEach(d => {
                disp.innerHTML += `<div class="flex justify-between bg-white/5 p-2 rounded-lg text-xs"><span>${d.data().name}</span><i class="fas fa-times text-red-500 cursor-pointer" onclick="remove('creators','${d.id}')"></i></div>`;
                select.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`;
            });
        });

        // --- Noha Publishing & Editing ---
        window.publishNoha = async () => {
            const editId = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('n-name').value,
                songPic: document.getElementById('n-pic').value,
                url: document.getElementById('n-url').value,
                category: document.getElementById('n-cat').value,
                reciter: document.getElementById('n-cre').value,
                natureUrl: document.getElementById('n-nature').value || "",
                rainUrl: document.getElementById('n-rain').value || "",
                timestamp: Date.now()
            };

            if(!data.name || !data.url) return alert("Title and Audio URL are required");

            if(editId) {
                await updateDoc(doc(db, "labaik_songs", editId), data);
                alert("Noha Updated!");
                resetForm();
            } else {
                await addDoc(collection(db, "labaik_songs"), data);
                alert("Noha Published!");
                resetForm();
            }
        };

        window.editNoha = (id, data) => {
            document.getElementById('edit-id').value = id;
            document.getElementById('n-name').value = data.name;
            document.getElementById('n-pic').value = data.songPic;
            document.getElementById('n-url').value = data.url;
            document.getElementById('n-cat').value = data.category || "";
            document.getElementById('n-cre').value = data.reciter || "";
            document.getElementById('n-nature').value = data.natureUrl || "";
            document.getElementById('n-rain').value = data.rainUrl || "";
            
            document.getElementById('form-mode-title').innerText = "EDITING RECORD";
            document.getElementById('publish-btn').innerText = "UPDATE RECORD";
            document.getElementById('noha-form-card').classList.add('edit-active');
            document.getElementById('cancel-edit-btn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.resetForm = () => {
            document.getElementById('edit-id').value = '';
            document.querySelectorAll('#noha-form-card input, #noha-form-card select').forEach(i => i.value = '');
            document.getElementById('form-mode-title').innerText = "4. Publish Noha";
            document.getElementById('publish-btn').innerText = "PUBLISH RECORD";
            document.getElementById('noha-form-card').classList.remove('edit-active');
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        };

        onSnapshot(query(collection(db, "labaik_songs"), orderBy("timestamp", "desc")), (snap) => {
            const disp = document.getElementById('noha-list');
            const unassignedDisp = document.getElementById('unassigned-list');
            disp.innerHTML = ''; unassignedDisp.innerHTML = '';
            
            snap.forEach(d => {
                const song = d.data();
                const itemHtml = `<div class="flex items-center gap-2 bg-white/5 p-2 rounded-lg text-[10px]">
                    <img src="${song.songPic}" class="w-6 h-6 rounded object-cover">
                    <span class="truncate flex-1">${song.name}</span>
                    <i class="fas fa-edit text-blue-400 cursor-pointer mr-1" onclick='editNoha("${d.id}", ${JSON.stringify(song).replace(/'/g, "&apos;")})'></i>
                    <i class="fas fa-trash text-red-800 cursor-pointer" onclick="remove('labaik_songs','${d.id}')"></i>
                </div>`;

                disp.innerHTML += itemHtml;
                
                // Check if unassigned
                if(!song.category || !song.reciter || song.category === "Assign Noha Category" || song.reciter === "Assign Reciter") {
                    unassignedDisp.innerHTML += itemHtml;
                }
            });
        });

        // --- Book Publishing ---
        window.publishBook = async () => {
            const data = {
                title: document.getElementById('b-title').value,
                author: document.getElementById('b-author').value,
                category: document.getElementById('b-cat').value,
                desc: document.getElementById('b-desc').value,
                cover: document.getElementById('b-pic').value,
                pdfUrl: document.getElementById('b-pdf').value,
                timestamp: Date.now()
            };
            if(data.title && data.pdfUrl) {
                await addDoc(collection(db, "labaik_library"), data);
                alert("Book Added!");
                document.querySelectorAll('.border-pink-500 input, .border-pink-500 textarea').forEach(i => i.value = '');
            }
        };

        onSnapshot(query(collection(db, "labaik_library"), orderBy("timestamp", "desc")), (snap) => {
            const disp = document.getElementById('book-list'); disp.innerHTML = '';
            snap.forEach(d => {
                disp.innerHTML += `<div class="flex items-center gap-3 bg-white/5 p-3 rounded-xl border border-white/5">
                    <img src="${d.data().cover}" class="w-8 h-10 object-cover rounded shadow-lg">
                    <div class="flex-1">
                        <p class="text-xs font-bold">${d.data().title}</p>
                        <p class="text-[8px] opacity-40 uppercase tracking-tighter">${d.data().category}</p>
                    </div>
                    <i class="fas fa-trash-alt text-red-500 cursor-pointer text-xs" onclick="remove('labaik_library','${d.id}')"></i>
                </div>`;
            });
        });
    </script>
</body>
</html>
