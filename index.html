<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LABAIK | Spotify Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --matte: #121212; --spotify: #1DB954; }
        body { background: var(--matte); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        .view-layer { position: fixed; inset: 0; z-index: 200; transform: translateX(100%); transition: 0.4s cubic-bezier(0.3, 0, 0, 1); background: var(--matte); overflow-y: auto; display: none; }
        .view-layer.active { transform: translateX(0); display: block; }
        
        .spotify-card { border-radius: 8px; padding: 12px; height: 110px; position: relative; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .spotify-card img { position: absolute; width: 70px; height: 70px; right: -15px; bottom: -5px; transform: rotate(25deg); object-fit: cover; border-radius: 4px; }
        
        .glass-header { background: linear-gradient(to bottom, #1db95444, var(--matte)); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.1); height: 4px; border-radius: 4px; accent-color: var(--spotify); }
    </style>
</head>
<body class="no-scrollbar">

    <div id="splash" class="fixed inset-0 z-[500] bg-black flex flex-col items-center justify-center transition-opacity duration-700">
        <h1 class="text-5xl font-black tracking-tighter text-white">LABAIK</h1>
        <p class="text-[#1DB954] text-[10px] font-bold mt-4 tracking-[0.5em] uppercase">By DAK</p>
    </div>

    <div id="app-wrap" class="pb-32 opacity-0 transition-opacity duration-1000">
        <div id="home-content" class="main-view">
            <header class="p-6 flex justify-between items-center">
                <h1 class="text-2xl font-bold">Good Day</h1>
                <i class="fas fa-cog text-xl text-gray-400" onclick="toggleView('settings-view', true)"></i>
            </header>
            <section class="px-4 mb-8">
                <h2 class="text-lg font-bold mb-4">Reciters</h2>
                <div id="creator-grid" class="grid grid-cols-2 gap-3"></div>
            </section>
            <section class="px-4">
                <h2 class="text-lg font-bold mb-4">Latest Nohas</h2>
                <div id="noha-feed" class="space-y-4"></div>
            </section>
        </div>
    </div>

    <div id="playlist-view" class="view-layer">
        <div class="glass-header p-6 pb-10">
            <i class="fas fa-chevron-down text-2xl mb-8" onclick="closeFullPlayer()"></i>
            <img id="p-art" class="w-64 h-64 mx-auto shadow-2xl mb-8 object-cover rounded-md">
            <h1 id="p-title" class="text-3xl font-black mb-1 text-center">Noha Name</h1>
            <p id="p-artist" class="text-[#1DB954] text-sm font-bold mb-8 uppercase text-center tracking-widest">Reciter</p>
            
            <div class="flex justify-between items-center px-4 mb-10">
                <div class="flex gap-8 text-2xl text-gray-400">
                    <i class="far fa-heart"></i>
                    <i class="fas fa-share-alt"></i>
                </div>
                <button onclick="toggleAudio()" class="w-16 h-16 bg-[#1DB954] rounded-full flex items-center justify-center text-black text-3xl shadow-xl">
                    <i id="play-btn-main" class="fas fa-play ml-1"></i>
                </button>
            </div>

            <div class="mx-4 glass p-6 rounded-3xl bg-white/5 border border-white/5">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-6 text-center">Audio Control Panel</p>
                <div class="space-y-6">
                    <div class="flex items-center gap-4">
                        <i class="fas fa-volume-up text-[#1DB954] w-5"></i>
                        <input type="range" id="vol-main" class="flex-1" value="100">
                    </div>
                    <div class="flex items-center gap-4">
                        <i class="fas fa-dove text-gray-500 w-5"></i>
                        <input type="range" id="vol-nature" class="flex-1" value="0">
                    </div>
                    <div class="flex items-center gap-4">
                        <i class="fas fa-cloud-rain text-gray-500 w-5"></i>
                        <input type="range" id="vol-rain" class="flex-1" value="0">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="mini-player" class="fixed bottom-20 left-2 right-2 bg-[#282828] h-14 rounded-md flex items-center px-2 hidden z-[300]" onclick="openFullPlayer()">
        <img id="m-art" class="w-10 h-10 rounded mr-3 object-cover">
        <div class="flex-1 overflow-hidden">
            <h4 id="m-title" class="text-xs font-bold truncate"></h4>
            <p class="text-[9px] text-[#1DB954] font-bold">LABAIK LIVE</p>
        </div>
        <i onclick="event.stopPropagation(); toggleAudio();" id="m-play" class="fas fa-play px-4 text-lg"></i>
    </div>

    <footer class="fixed bottom-0 w-full h-20 bg-black border-t border-white/5 flex justify-around items-center text-gray-500">
        <div class="flex flex-col items-center gap-1 text-white"><i class="fas fa-home"></i><span class="text-[9px]">Home</span></div>
        <div class="flex flex-col items-center gap-1"><i class="fas fa-search"></i><span class="text-[9px]">Search</span></div>
        <div class="flex flex-col items-center gap-1"><i class="fas fa-layer-group"></i><span class="text-[9px]">Library</span></div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA1tNtHLr5xiTFuU9qvEEc6IwmQFqWJLU4",
            authDomain: "zaigham-apps.firebaseapp.com",
            projectId: "zaigham-apps",
            appId: "1:640695849473:web:8720ecd76e0634661a2600"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let audioMain = new Audio();
        let audioNature = new Audio();
        let audioRain = new Audio();
        audioNature.loop = audioRain.loop = true;

        window.toggleView = (id, show) => {
            const el = document.getElementById(id);
            if(show) { el.classList.add('active'); el.style.display = 'block'; }
            else { el.classList.remove('active'); setTimeout(()=> el.style.display='none', 400); }
        };

        // Logic: Jab list se click ho toh Mini player hte aur Full Player khule
        window.setupPlayer = (s) => {
            document.getElementById('m-art').src = document.getElementById('p-art').src = s.songPic;
            document.getElementById('m-title').innerText = document.getElementById('p-title').innerText = s.name;
            
            // Foran Full Player kholna aur Mini player chupana
            document.getElementById('mini-player').classList.add('hidden');
            toggleView('playlist-view', true);
            
            audioMain.src = s.url.replace('dl=0', 'dl=1');
            audioMain.play();
            updateIcons('fas fa-pause');
        };

        window.openFullPlayer = () => {
            document.getElementById('mini-player').classList.add('hidden');
            toggleView('playlist-view', true);
        };

        window.closeFullPlayer = () => {
            toggleView('playlist-view', false);
            // Full player band hote hi mini player wapis aa jaye agar gaana chal raha ho
            if(!audioMain.paused) {
                document.getElementById('mini-player').classList.remove('hidden');
            }
        };

        window.toggleAudio = () => {
            if(audioMain.paused) { audioMain.play(); updateIcons('fas fa-pause'); }
            else { audioMain.pause(); updateIcons('fas fa-play'); }
        };

        const updateIcons = (cls) => {
            document.getElementById('play-btn-main').className = cls + (cls.includes('play') ? ' ml-1' : '');
            document.getElementById('m-play').className = cls;
        };

        // Volume Controls
        document.getElementById('vol-main').oninput = (e) => audioMain.volume = e.target.value / 100;
        document.getElementById('vol-nature').oninput = (e) => { audioNature.volume = e.target.value / 100; if(audioNature.paused) audioNature.play(); };
        document.getElementById('vol-rain').oninput = (e) => { audioRain.volume = e.target.value / 100; if(audioRain.paused) audioRain.play(); };

        // Firebase Data
        onSnapshot(query(collection(db, "labaik_songs"), orderBy("timestamp", "desc")), (snap) => {
            const feed = document.getElementById('noha-feed'); feed.innerHTML = '';
            snap.forEach(d => {
                const s = d.data();
                feed.innerHTML += `<div class="flex items-center gap-4" onclick='setupPlayer(${JSON.stringify(s)})'>
                    <img src="${s.songPic}" class="w-12 h-12 rounded object-cover shadow-lg">
                    <div class="flex-1"><h4 class="text-sm font-bold truncate">${s.name}</h4><p class="text-[10px] text-gray-500 uppercase">LABAIK NOHA</p></div>
                </div>`;
            });
        });

        onSnapshot(collection(db, "creators"), (snap) => {
            const grid = document.getElementById('creator-grid'); grid.innerHTML = '';
            const colors = ['#E8115B', '#8D67AB', '#1E3264', '#148A08']; let i = 0;
            snap.forEach(d => {
                const c = d.data();
                grid.innerHTML += `<div class="spotify-card" style="background: ${colors[i % 4]}">
                    <span class="font-bold text-sm">${c.name}</span><img src="${c.pic}"></div>`;
                i++;
            });
        });

        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => { document.getElementById('splash').style.display = 'none'; document.getElementById('app-wrap').style.opacity = '1'; }, 700); }, 2500);
    </script>
</body>
</html>
