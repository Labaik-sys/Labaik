<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LABAIK | Spotify Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --matte: #121212; --spotify: #1DB954; }
        body { background: var(--matte); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Smooth Layer Transitions */
        .view-layer { position: fixed; inset: 0; z-index: 200; transform: translateX(100%); transition: 0.4s cubic-bezier(0.3, 0, 0, 1); background: var(--matte); overflow-y: auto; display: none; }
        .view-layer.active { transform: translateX(0); display: block; }
        
        .spotify-card { border-radius: 8px; padding: 12px; height: 110px; position: relative; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .spotify-card:active { scale: 0.95; }
        .spotify-card img { position: absolute; width: 70px; height: 70px; right: -15px; bottom: -5px; transform: rotate(25deg); object-fit: cover; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .glass-header { background: linear-gradient(to bottom, #1db95444, var(--matte)); }
        .mini-player-anim { animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="no-scrollbar">

    <div id="splash" class="fixed inset-0 z-[500] bg-black flex flex-col items-center justify-center transition-opacity duration-700">
        <div class="relative">
            <h1 class="text-5xl font-black tracking-tighter animate-pulse">LABAIK</h1>
            <div class="absolute -right-4 -top-2 w-2 h-2 bg-[#1DB954] rounded-full"></div>
        </div>
        <p class="text-[#1DB954] text-[10px] font-bold mt-4 tracking-[0.5em] opacity-80 uppercase">The Call of Devotion</p>
        <p class="text-gray-600 text-[8px] absolute bottom-10 tracking-widest uppercase">By DAK</p>
    </div>

    <div id="app-wrap" class="pb-32 opacity-0 transition-opacity duration-1000">
        
        <div id="home-content" class="main-view">
            <header class="p-6 flex justify-between items-center">
                <h1 class="text-2xl font-bold">ان الحسین مصباح الهدی و سفینة النجاة

</h1>
                <div class="flex gap-5 text-xl">
                    <i class="far fa-bell"></i>
                    <i class="fas fa-history" onclick="toggleView('settings-view', true)"></i>
                    <i class="fas fa-cog" onclick="toggleView('settings-view', true)"></i>
                </div>
            </header>
            
            <section class="px-4 mb-8">
                <h2 class="text-lg font-bold mb-4">Reciters</h2>
                <div id="creator-grid" class="grid grid-cols-2 gap-3"></div>
            </section>

            <section class="px-4">
                <h2 class="text-lg font-bold mb-4">Latest Nohas</h2>
                <div id="noha-feed" class="space-y-4"></div>
            </section>
        </div>

        <div id="search-content" class="main-view hidden p-6">
            <h1 class="text-3xl font-bold mb-6">Search</h1>
            <div class="relative mb-8">
                <i class="fas fa-search absolute left-4 top-4 text-gray-700"></i>
                <input type="text" id="user-search" oninput="doSearch()" placeholder="What do you want to listen to?" 
                    class="w-full bg-white py-4 pl-12 pr-4 rounded-md text-black font-semibold outline-none">
            </div>
            <div id="search-results" class="space-y-4"></div>
        </div>
    </div>

    <div id="playlist-view" class="view-layer">
        <div class="glass-header p-6 pb-10">
            <i class="fas fa-chevron-down text-2xl mb-8" onclick="toggleView('playlist-view', false)"></i>
            <img id="p-art" class="w-64 h-64 mx-auto shadow-2xl mb-8 object-cover rounded-md">
            <h1 id="p-title" class="text-3xl font-black mb-1">Noha Name</h1>
            <p id="p-artist" class="text-[#1DB954] text-sm font-bold mb-8 uppercase tracking-widest">Reciter</p>
            
            <div class="flex justify-between items-center px-2">
                <div class="flex gap-8 text-2xl text-gray-400">
                    <i class="far fa-heart" onclick="this.classList.toggle('fas'); this.classList.toggle('text-[#1DB954]')"></i>
                    <i class="fas fa-share-alt" onclick="shareNoha()"></i>
                </div>
                <button onclick="toggleAudio()" class="w-16 h-16 bg-[#1DB954] rounded-full flex items-center justify-center text-black text-3xl shadow-xl active:scale-90 transition-all">
                    <i id="play-btn-main" class="fas fa-play ml-1"></i>
                </button>
            </div>
        </div>

        <div class="p-8 space-y-8">
             <div class="glass p-6 rounded-3xl bg-white/5 border border-white/5">
                <p class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-6 text-center">Atmospheric Control</p>
                <div class="space-y-6">
                    <div class="flex items-center gap-4"><i class="fas fa-dove text-gray-500 w-5"></i><input type="range" id="vol-nature" class="flex-1 accent-[#1DB954]" value="0"></div>
                    <div class="flex items-center gap-4"><i class="fas fa-cloud-rain text-gray-500 w-5"></i><input type="range" id="vol-rain" class="flex-1 accent-[#1DB954]" value="0"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="settings-view" class="view-layer p-6">
        <header class="flex items-center gap-4 mb-10">
            <i class="fas fa-arrow-left text-xl" onclick="toggleView('settings-view', false)"></i>
            <h2 class="text-xl font-bold">Profile Settings</h2>
        </header>

        <div class="flex flex-col items-center mb-10">
            <div class="relative">
                <img id="user-pic" src="https://via.placeholder.com/100" class="w-24 h-24 rounded-full object-cover border-2 border-[#1DB954] p-1">
                <label for="pic-upload" class="absolute bottom-0 right-0 bg-[#1DB954] w-8 h-8 rounded-full flex items-center justify-center text-black border-2 border-black cursor-pointer">
                    <i class="fas fa-camera text-xs"></i>
                </label>
                <input type="file" id="pic-upload" class="hidden" onchange="updateProfilePic(this)">
            </div>
            <input type="text" id="username-input" onblur="saveUsername()" placeholder="Enter Username" class="bg-transparent text-center text-xl font-bold mt-4 border-b border-white/10 outline-none w-48">
        </div>

        <div class="space-y-6">
            <div>
                <p class="text-xs text-gray-500 uppercase font-bold mb-3">Language</p>
                <select onchange="changeLanguage(this.value)" class="w-full bg-white/5 p-4 rounded-xl outline-none">
                    <option value="en">English</option>
                    <option value="ur">Urdu</option>
                </select>
            </div>
            <div>
                <p class="text-xs text-gray-500 uppercase font-bold mb-3">Listening History</p>
                <div id="history-list" class="space-y-3 max-h-60 overflow-y-auto no-scrollbar"></div>
            </div>
        </div>

        <div class="mt-20 text-center opacity-30">
            <p class="text-[10px] tracking-[0.5em] font-black">BY ZAK</p>
        </div>
    </div>

    <div id="mini-player" class="fixed bottom-20 left-2 right-2 bg-[#282828] h-14 rounded-md flex items-center px-2 hidden z-[300] mini-player-anim" onclick="toggleView('playlist-view', true)">
        <img id="m-art" class="w-10 h-10 rounded mr-3 object-cover">
        <div class="flex-1 overflow-hidden">
            <h4 id="m-title" class="text-xs font-bold truncate"></h4>
            <p class="text-[9px] text-[#1DB954] font-bold">LABAIK LIVE</p>
        </div>
        <div class="flex items-center gap-5 px-3">
            <i class="fas fa-share-alt text-gray-400" onclick="event.stopPropagation(); shareNoha();"></i>
            <i onclick="event.stopPropagation(); toggleAudio();" id="m-play" class="fas fa-play text-lg"></i>
        </div>
    </div>

    <footer class="fixed bottom-0 w-full h-20 bg-black border-t border-white/5 flex justify-around items-center text-gray-500">
        <div onclick="switchMainView('home')" id="nav-home" class="flex flex-col items-center gap-1 text-white">
            <i class="fas fa-home"></i><span class="text-[9px]">Home</span>
        </div>
        <div onclick="switchMainView('search')" id="nav-search" class="flex flex-col items-center gap-1">
            <i class="fas fa-search"></i><span class="text-[9px]">Search</span>
        </div>
        <div onclick="toggleView('settings-view', true)" class="flex flex-col items-center gap-1">
            <i class="fas fa-layer-group"></i><span class="text-[9px]">Library</span>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA1tNtHLr5xiTFuU9qvEEc6IwmQFqWJLU4",
            authDomain: "zaigham-apps.firebaseapp.com",
            projectId: "zaigham-apps",
            appId: "1:640695849473:web:8720ecd76e0634661a2600"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let audioMain = new Audio();
        let audioNature = new Audio();
        let audioRain = new Audio();
        audioNature.loop = audioRain.loop = true;
        
        let allNohas = [];
        let history = JSON.parse(localStorage.getItem('labaik_history')) || [];

        // App Initialization
        window.onload = () => {
            document.getElementById('username-input').value = localStorage.getItem('labaik_user') || "New Reciter";
            document.getElementById('user-pic').src = localStorage.getItem('labaik_pic') || "https://via.placeholder.com/100";
            renderHistory();
        };

        window.toggleView = (id, show) => {
            const el = document.getElementById(id);
            if(show) { el.classList.add('active'); el.style.display = 'block'; }
            else { el.classList.remove('active'); setTimeout(()=> el.style.display='none', 400); }
        };

        window.switchMainView = (view) => {
            document.getElementById('home-content').classList.toggle('hidden', view !== 'home');
            document.getElementById('search-content').classList.toggle('hidden', view !== 'search');
            document.getElementById('nav-home').classList.toggle('text-white', view === 'home');
            document.getElementById('nav-search').classList.toggle('text-white', view === 'search');
        };

        // Profile Functions
        window.saveUsername = () => localStorage.setItem('labaik_user', document.getElementById('username-input').value);
        window.updateProfilePic = (input) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('user-pic').src = e.target.result;
                localStorage.setItem('labaik_pic', e.target.result);
            };
            reader.readAsDataURL(input.files[0]);
        };

        // History Management
        const addToHistory = (song) => {
            history = history.filter(h => h.name !== song.name);
            history.unshift(song);
            if(history.length > 10) history.pop();
            localStorage.setItem('labaik_history', JSON.stringify(history));
            renderHistory();
        };

        const renderHistory = () => {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            history.forEach(h => {
                list.innerHTML += `<div class="flex items-center gap-3 bg-white/5 p-2 rounded-lg">
                    <img src="${h.songPic}" class="w-8 h-8 rounded object-cover">
                    <p class="text-xs truncate">${h.name}</p>
                </div>`;
            });
        };

        // Player Logic
        window.setupPlayer = (s) => {
            document.getElementById('m-art').src = document.getElementById('p-art').src = s.songPic;
            document.getElementById('m-title').innerText = document.getElementById('p-title').innerText = s.name;
            document.getElementById('mini-player').classList.remove('hidden');
            
            audioMain.src = s.url.replace('dl=0', 'dl=1');
            audioNature.src = s.natureUrl || "";
            audioRain.src = s.rainUrl || "";
            
            audioMain.play();
            addToHistory(s);
            document.getElementById('play-btn-main').className = 'fas fa-pause';
            document.getElementById('m-play').className = 'fas fa-pause';
            toggleView('playlist-view', true);
        };

        window.toggleAudio = () => {
            if(audioMain.paused) { audioMain.play(); updateIcons('fas fa-pause'); }
            else { audioMain.pause(); updateIcons('fas fa-play'); }
        };

        const updateIcons = (cls) => {
            document.getElementById('play-btn-main').className = cls + (cls.includes('play') ? ' ml-1' : '');
            document.getElementById('m-play').className = cls;
        };

        // Data Fetching
        onSnapshot(collection(db, "creators"), (snap) => {
            const grid = document.getElementById('creator-grid'); grid.innerHTML = '';
            const colors = ['#E8115B', '#8D67AB', '#1E3264', '#148A08', '#E13300'];
            let i = 0;
            snap.forEach(d => {
                const c = d.data();
                grid.innerHTML += `<div class="spotify-card" style="background: ${colors[i % 5]}" onclick="switchMainView('search')">
                    <span class="font-bold text-sm">${c.name}</span><img src="${c.pic}"></div>`;
                i++;
            });
        });

        onSnapshot(query(collection(db, "labaik_songs"), orderBy("timestamp", "desc")), (snap) => {
            allNohas = [];
            const feed = document.getElementById('noha-feed'); feed.innerHTML = '';
            snap.forEach(d => {
                const s = d.data(); allNohas.push(s);
                feed.innerHTML += `<div class="flex items-center gap-4 active:opacity-50" onclick='setupPlayer(${JSON.stringify(s)})'>
                    <img src="${s.songPic}" class="w-12 h-12 rounded object-cover shadow-lg">
                    <div class="flex-1"><h4 class="text-sm font-bold truncate">${s.name}</h4><p class="text-[10px] text-gray-500">NOHA</p></div>
                    <i class="fas fa-ellipsis-v text-gray-700"></i></div>`;
            });
        });

        window.doSearch = () => {
            const q = document.getElementById('user-search').value.toLowerCase();
            const results = document.getElementById('search-results'); results.innerHTML = '';
            allNohas.filter(n => n.name.toLowerCase().includes(q)).forEach(s => {
                results.innerHTML += `<div class="flex items-center gap-4" onclick='setupPlayer(${JSON.stringify(s)})'>
                    <img src="${s.songPic}" class="w-10 h-10 rounded">
                    <p class="text-sm font-bold">${s.name}</p></div>`;
            });
        };

        window.shareNoha = () => navigator.share ? navigator.share({ title: 'LABAIK', text: 'Listen to this Noha', url: window.location.href }) : null;
        document.getElementById('vol-nature').oninput = (e) => { audioNature.volume = e.target.value / 100; if(audioNature.paused) audioNature.play(); };
        document.getElementById('vol-rain').oninput = (e) => { audioRain.volume = e.target.value / 100; if(audioRain.paused) audioRain.play(); };

        setTimeout(() => { document.getElementById('splash').style.opacity = '0'; setTimeout(() => { document.getElementById('splash').style.display = 'none'; document.getElementById('app-wrap').style.opacity = '1'; }, 700); }, 2500);
    </script>
</body>
              </html>
